{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2>Reports</h2>

    {% if reports %}
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User ID</th>
                    <th>Report Name</th>
                    <th>Created At</th>
                </tr>
            </thead>

            <tbody>
                {% for report in reports %}
                <tr>
                    <td>{{ report.id }}</td>
                    <td>{{ report.user_id }}</td>
                    <td>{{ report.report_name }}</td>
                    <td>{{ report.created_at }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    {% else %}
        <p>No reports found.</p>
    {% endif %}

</div>

{% endblock %}

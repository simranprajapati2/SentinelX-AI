{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="glass-card auth-card">

        <h1>Create Account</h1>

        <form
            method="POST"
            action="{{ url_for('auth.register') }}"
        >

            {{ form.hidden_tag() }}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="text"
                name="full_name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <br>

        <a href="{{ url_for('auth.login') }}">
            Already have an account? Login
        </a>

    </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}
Resend Verification
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="glass-card auth-card">

        <h1>Resend Verification Email</h1>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <button type="submit">
                Send Verification Email
            </button>

        </form>

        <br>

        <a href="{{ url_for('auth.login') }}">
            Back to Login
        </a>

    </div>

</div>

{% endblock %}
